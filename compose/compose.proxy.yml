services:
    tun2proxy:
        container_name: tun2proxy
        image: ghcr.io/xterna/tun2proxy
        restart: always
        hostname: $DEVICE_ID
        labels:
            - project=proxy
            - com.centurylinklabs.watchtower.scope=igm
        environment:
            - LOGLEVEL=error
            - PROXY=${PROXY_URL:-}
            - TCP_TIMEOUT=300
            - UDP_TIMEOUT=5
            - MAX_SESSIONS=200
        cap_add:
            - NET_ADMIN
        security_opt:
            - no-new-privileges:true
        pids_limit: 200
        network_mode: bridge
        dns:
            - 1.1.1.1
            - 8.8.8.8
        devices:
            - /dev/net/tun:/dev/net/tun
        cpus: $ALT_MIN_CPU_LIMIT
        mem_limit: $RAM_LIMIT
        mem_reservation: $RAM_RESERVE
        logging:
            driver: json-file
            options:
                max-size: 5k
                max-file: 1
